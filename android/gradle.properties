# Safer defaults: 8G heap + 4G metaspace can exhaust RAM on 16GB machines and get the JVM killed
# (Gradle: "daemon disappeared unexpectedly"). Tune up if you have 32GB+ and slow builds.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

org.gradle.parallel=true
org.gradle.caching=true
org.gradle.workers.max=4

android.useAndroidX=true
android.enableJetifier=true
